media:
  input: public/uploads
  output: /uploads

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{title}.md"
      field: create
    view:
      primary: title
      fields: [pubDate, category, draft]
      sort: pubDate
      order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Publish Date
        type: date
      - name: updatedDate
        label: Updated Date
        type: date
      - name: author
        label: Author
        type: string
      - name: category
        label: Category
        type: string
      - name: tags
        label: Tags
        type: string
        list: true
      - name: image
        label: Cover Image
        type: image
      - name: sourceUrl
        label: Source URL
        type: string
      - name: draft
        label: Draft
        type: boolean
      - name: body
        label: Body
        type: rich-text
